<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamTube - Dark Mode</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #f1f1f1;
            --secondary-bg: #272727;
            --accent-color: #ff9900;
            --hover-color: #3f3f3f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--secondary-bg);
            border-bottom: 1px solid #333;
        }

        .brand { font-size: 24px; font-weight: bold; letter-spacing: 1px; cursor: pointer; }
        .brand span { color: var(--accent-color); }

        #home-view { padding: 30px; max-width: 1600px; margin: 0 auto; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            row-gap: 30px;
        }

        .video-card { cursor: pointer; transition: transform 0.2s ease; }
        .video-card:hover { transform: scale(1.02); }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #333;
            border-radius: 8px;
            margin-bottom: 10px;
            position: relative;
            background-position: center;
            background-size: cover;
        }

        .duration {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 12px;
        }

        .video-title { font-size: 16px; font-weight: 600; margin-bottom: 5px; line-height: 1.3; }
        .video-meta { font-size: 13px; color: #aaaaaa; }

        #player-view {
            display: none;
            max-width: 1600px;
            margin: 20px auto;
            padding: 0 30px;
            gap: 25px;
        }

        .main-player-section { flex: 3; min-width: 0; }
        .sidebar-section { flex: 1; min-width: 300px; }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        video { width: 100%; height: 100%; outline: none; }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
            pointer-events: none;
        }

        @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        .player-title { font-size: 22px; margin: 15px 0 5px 0; }
        .player-meta { font-size: 14px; color: #aaa; padding-bottom: 15px; border-bottom: 1px solid #333; }

        .sidebar-item { display: flex; gap: 10px; margin-bottom: 15px; cursor: pointer; }
        
        .sidebar-thumbnail {
            width: 160px;
            height: 90px;
            background-color: #333;
            border-radius: 4px;
            flex-shrink: 0;
            background-position: center;
            background-size: cover;
        }

        .sidebar-info .video-title { font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <div class="brand" onclick="goHome()">Stream<span>Tube</span></div>
        <div>
            <button style="background:var(--accent-color); border:none; padding:8px 15px; border-radius:4px; color:#fff; font-weight:bold; cursor:pointer;">Log In</button>
        </div>
    </header>

    <div id="home-view">
        <h2 style="margin-bottom: 20px;">Trending Now</h2>
        <div class="grid-container" id="video-grid">
            </div>
    </div>

    <div id="player-view">
        <div class="main-player-section">
            <div class="video-wrapper">
                <video id="main-video" controls>
                    <source src="" type="video/mp4">
                    Your browser does not support HTML video.
                </video>
                <div class="loading-spinner" id="spinner"></div>
            </div>
            <h1 class="player-title" id="current-title">Loading...</h1>
            <div class="player-meta" id="current-meta">Loading details...</div>
        </div>

        <div class="sidebar-section">
            <h3>Up Next</h3>
            <div style="margin-top: 15px;" id="sidebar-grid">
                </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        
        const homeView = document.getElementById('home-view');
        const playerView = document.getElementById('player-view');
        const videoGrid = document.getElementById('video-grid');
        const sidebarGrid = document.getElementById('sidebar-grid');
        const mainVideo = document.getElementById('main-video');
        const currentTitle = document.getElementById('current-title');
        const currentMeta = document.getElementById('current-meta');
        const spinner = document.getElementById('spinner');

        const formatViews = (views) => {
            if (views >= 1000000) return (views / 1000000).toFixed(1) + 'M';
            if (views >= 1000) return (views / 1000).toFixed(1) + 'K';
            return views;
        };

        async function loadHomeGrid() {
            try {
                const response = await fetch(`${API_URL}/videos/trending`);
                if (!response.ok) throw new Error("Backend not responding");
                const videos = await response.json();
                
                videoGrid.innerHTML = videos.map(video => `
                    <div class="video-card" onclick="openVideo('${video.id}')">
                        <div class="thumbnail" style="background-image: url('${video.thumbnailUrl}');">
                            <div class="duration">${video.duration}</div>
                        </div>
                        <div class="video-title">${video.title}</div>
                        <div class="video-meta">${video.uploader} • ${formatViews(video.views)} views</div>
                    </div>
                `).join('');
            } catch (error) {
                videoGrid.innerHTML = `<h3 style="color:red;">Error: Make sure you ran 'node server.js' in your terminal!</h3>`;
            }
        }

        async function openVideo(videoId) {
            try {
                const videoRes = await fetch(`${API_URL}/videos/${videoId}`);
                const videoData = await videoRes.json();

                const relatedRes = await fetch(`${API_URL}/videos/${videoId}/related`);
                const relatedData = await relatedRes.json();

                currentTitle.innerText = videoData.title;
                currentMeta.innerText = `${videoData.uploader} • ${formatViews(videoData.views)} views`;
                mainVideo.src = videoData.videoUrl;
                
                sidebarGrid.innerHTML = relatedData.map(v => `
                    <div class="sidebar-item" onclick="openVideo('${v.id}')">
                        <div class="sidebar-thumbnail" style="background-image: url('${v.thumbnailUrl}');"></div>
                        <div class="sidebar-info">
                            <div class="video-title">${v.title}</div>
                            <div class="video-meta">${v.uploader} • ${formatViews(v.views)} views</div>
                        </div>
                    </div>
                `).join('');

                homeView.style.display = 'none';
                playerView.style.display = 'flex';
                mainVideo.play();
            } catch (error) {
                console.error("Error loading video:", error);
            }
        }

        function goHome() {
            playerView.style.display = 'none';
            homeView.style.display = 'block';
            mainVideo.pause();
        }

        mainVideo.addEventListener('waiting', () => spinner.style.display = 'block');
        mainVideo.addEventListener('playing', () => spinner.style.display = 'none');
        mainVideo.addEventListener('canplay', () => spinner.style.display = 'none');

        // Start the app
        loadHomeGrid();
    </script>
</body>
</html>
